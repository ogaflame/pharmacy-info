<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>疑義解釈の送付についてを検索したい</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Meiryo, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }

    .page {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 16px 32px;
    }

    .header {
      margin-bottom: 18px;
    }

    .title {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
      color: #111827;
    }

    .subtitle {
      margin: 0;
      font-size: 14px;
      color: #6b7280;
      line-height: 1.6;
    }

    .search-card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      margin-bottom: 18px;
    }

    .search-box {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      font-size: 16px;
      outline: none;
      transition: 0.2s;
      background: #fff;
    }

    .search-box:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
    }

    .search-meta {
      margin-top: 10px;
      font-size: 13px;
      color: #6b7280;
    }

    .layout {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 18px;
      min-height: 620px;
    }

    .panel {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      overflow: hidden;
    }

    .panel-header {
      padding: 14px 16px;
      border-bottom: 1px solid #e5e7eb;
      background: #fafafa;
      font-weight: 700;
      font-size: 14px;
      color: #374151;
    }

    .results {
      max-height: 620px;
      overflow-y: auto;
      padding: 10px;
    }

    .result-item {
      padding: 12px 12px 10px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #fff;
      cursor: pointer;
      transition: 0.18s ease;
      margin-bottom: 10px;
    }

    .result-item:hover {
      background: #f8fbff;
      border-color: #bfdbfe;
      transform: translateY(-1px);
    }

    .result-item.active {
      background: #eff6ff;
      border-color: #60a5fa;
    }

    .result-question {
      font-size: 14px;
      font-weight: 700;
      color: #111827;
      line-height: 1.5;
      margin-bottom: 6px;
    }

    .result-section {
      display: inline-block;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 999px;
      background: #eef2ff;
      color: #4338ca;
    }

    .detail {
      padding: 22px 22px 28px;
      min-height: 620px;
    }

    .placeholder {
      color: #6b7280;
      font-size: 15px;
      line-height: 1.8;
      padding-top: 6px;
    }

    .detail-question {
      margin: 0 0 10px;
      font-size: 25px;
      line-height: 1.5;
      color: #111827;
    }

    .detail-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }

    .tag {
      display: inline-block;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #f3f4f6;
      color: #374151;
    }

    .tag.section {
      background: #eef2ff;
      color: #4338ca;
    }

    .answer-box {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 18px;
      line-height: 1.9;
      font-size: 15px;
      color: #1f2937;
      white-space: pre-wrap;
    }

    .detail-actions {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .btn-link {
      display: inline-block;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 10px;
      background: #2563eb;
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      transition: 0.18s ease;
    }

    .btn-link:hover {
      background: #1d4ed8;
    }

    .empty-result {
      padding: 18px 14px;
      color: #6b7280;
      font-size: 14px;
      line-height: 1.7;
    }

    .footer-note {
      margin-top: 14px;
      font-size: 12px;
      color: #6b7280;
      line-height: 1.7;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .results {
        max-height: 300px;
      }

      .detail {
        min-height: auto;
      }

      .detail-question {
        font-size: 21px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="header">
      <h1 class="title">疑義解釈検索</h1>
      <p class="subtitle">
        疑義解釈資料を問ごとに検索できます。キーワードを入力し、左の候補から選ぶと、右側に内容を表示します。
      </p>
    </div>

    <div class="search-card">
      <input
        type="text"
        id="searchBox"
        class="search-box"
        placeholder="問番号、加算名、キーワードで検索（例：残薬、かかりつけ、問10）"
      />
      <div class="search-meta" id="searchMeta">データを読み込み中です…</div>
    </div>

    <div class="layout">
      <div class="panel">
        <div class="panel-header">候補一覧</div>
        <div id="list" class="results"></div>
      </div>

      <div class="panel">
        <div class="panel-header">詳細</div>
        <div id="detail" class="detail">
          <div class="placeholder">
            左の候補を選ぶと、ここに内容が表示されます。<br />
            まずは「残薬」「かかりつけ」「問10」などで試してみてください。
          </div>
        </div>
      </div>
    </div>

    <div class="footer-note">
      検索結果は確認を助けるためのものです。最終判断は原本PDFで確認してください。
    </div>
  </div>

  <script>
    let data = [];
    let filteredData = [];
    let selectedIndex = -1;

    const box = document.getElementById("searchBox");
    const list = document.getElementById("list");
    const detail = document.getElementById("detail");
    const searchMeta = document.getElementById("searchMeta");

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function renderMeta(total, filtered, query) {
      if (!data.length) {
        searchMeta.textContent = "データがありません。";
        return;
      }

      if (!query) {
        searchMeta.textContent = `全 ${total} 件を読み込みました。キーワードを入力すると候補が絞り込まれます。`;
        return;
      }

      searchMeta.textContent = `「${query}」の検索結果：${filtered} 件 / 全 ${total} 件`;
    }

    function renderDetail(item) {
      if (!item) {
        detail.innerHTML = `
          <div class="placeholder">
            該当するデータがありません。別のキーワードで試してください。
          </div>
        `;
        return;
      }

      detail.innerHTML = `
        <h2 class="detail-question">${escapeHtml(item.question)}</h2>

        <div class="detail-tags">
          <span class="tag section">${escapeHtml(item.section || "未分類")}</span>
          <span class="tag">PDF: ${escapeHtml(item.pdf || "")}</span>
          <span class="tag">ページ: ${escapeHtml(item.page || "")}</span>
        </div>

        <div class="answer-box">${escapeHtml(item.answer || "")}</div>

        <div class="detail-actions">
          <a class="btn-link" href="${item.pdf}#page=${item.page}" target="_blank" rel="noopener noreferrer">
            原本PDFを見る
          </a>
        </div>
      `;
    }

    function renderList(items) {
      list.innerHTML = "";

      if (!items.length) {
        list.innerHTML = `<div class="empty-result">該当する候補がありません。</div>`;
        renderDetail(null);
        return;
      }

      items.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "result-item" + (index === selectedIndex ? " active" : "");

        div.innerHTML = `
          <div class="result-question">${escapeHtml(item.question)}</div>
          <span class="result-section">${escapeHtml(item.section || "未分類")}</span>
        `;

        div.onclick = () => {
          selectedIndex = index;
          renderList(filteredData);
          renderDetail(item);
        };

        list.appendChild(div);
      });
    }

    function normalizeText(text) {
      return String(text || "").toLowerCase();
    }

    function runSearch() {
      const q = box.value.trim().toLowerCase();

      filteredData = data.filter(item => {
        const question = normalizeText(item.question);
        const section = normalizeText(item.section);
        const answer = normalizeText(item.answer);

        return !q || question.includes(q) || section.includes(q) || answer.includes(q);
      });

      selectedIndex = filteredData.length > 0 ? 0 : -1;

      renderMeta(data.length, filteredData.length, box.value.trim());
      renderList(filteredData);
      renderDetail(filteredData[0] || null);
    }

    fetch("data/questions.json")
      .then(res => {
        if (!res.ok) {
          throw new Error("questions.json の読み込みに失敗しました。");
        }
        return res.json();
      })
      .then(json => {
        data = json;
        filteredData = json;
        selectedIndex = json.length > 0 ? 0 : -1;

        renderMeta(data.length, filteredData.length, "");
        renderList(filteredData);
        renderDetail(filteredData[0] || null);
      })
      .catch(err => {
        searchMeta.textContent = "データの読み込みに失敗しました。";
        list.innerHTML = `<div class="empty-result">${escapeHtml(err.message)}</div>`;
        detail.innerHTML = `
          <div class="placeholder">
            questions.json の場所や書式を確認してください。
          </div>
        `;
      });

    box.addEventListener("input", runSearch);
  </script>
</body>
</html>
